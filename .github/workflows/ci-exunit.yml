name: ci/exunit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  exunit:
    name: ci/exunit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.4"
          otp-version: "28.0.2"

      - name: Install Dependencies
        run: mix deps.get

      - name: Run ExUnit
        run: mix test
